<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>파란코끼리 상담원</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="phone-frame">
        <header class="hero">
          <p class="eyebrow">HANA ENT ASSISTANT</p>
          <h1>파란코끼리 상담원</h1>
          <p class="subtitle">
            예약, 위치, 진료 준비사항과 서류 발급 안내를 모바일 화면에서 바로 확인할 수 있습니다.
          </p>
        </header>

        <section class="notice-card">
          <strong>안내</strong>
          <p>
            이 서비스는 병원 문서를 바탕으로 답변합니다. 진단, 처방 변경, 응급 판단은 하지 않습니다.
            주민등록번호, 전화번호, 이메일, 상세 주소 같은 개인정보는 입력하지 말아 주세요.
          </p>
        </section>

        <section id="chat" class="chat-panel" aria-live="polite"></section>

        <section class="quick-actions">
          <button type="button" class="chip" data-question="진료과를 알려줘">진료과</button>
          <button type="button" class="chip" data-question="하나이비인후과 원장 진료시간 알려줘">원장 일정</button>
          <button type="button" class="chip" data-question="신경과 원장 진료시간 알려줘">신경과 일정</button>
          <button type="button" class="chip" data-question="진료시간 안내해줘">병원 진료시간</button>
          <button type="button" class="chip" data-question="예약 변경 방법 알려줘">예약 변경</button>
          <button type="button" class="chip" data-question="코골이 진료 과를 알려줘">코골이 상담</button>
        </section>

        <form id="chat-form" class="composer">
          <input
            id="message-input"
            name="message"
            type="text"
            maxlength="300"
            placeholder="개인정보 없이 질문을 입력해 주세요"
            autocomplete="off"
          />
          <button type="submit">전송</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
